<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السنونو — المراقبة</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#F57C00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--purple:#7C3AED;--bg:#F4F6FB;--card:#FFFFFF;--green:#00A846;--red:#E53935;--blue:#0088CC;--orange:#F57C00;--gold:#E6A800;--text:#1A1A2E;--muted:#6B7280;--border:rgba(124,58,237,0.15);}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 32px;width:100%;max-width:360px;text-align:center;}
.lcard h2{font-size:1.5rem;font-weight:900;color:var(--purple);margin-bottom:5px;}
.lcard p{color:var(--muted);font-size:.83rem;margin-bottom:28px;}
input[type="password"]{width:100%;background:#F8FAFC;border:1.5px solid #E5E7EB;border-radius:12px;padding:13px 18px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.95rem;margin-bottom:14px;outline:none;direction:rtl;text-align:center;}
.btn-purple{width:100%;background:linear-gradient(135deg,var(--purple),#7C3AED);color:#fff;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}
#app{display:none;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.tb-title{font-size:.95rem;font-weight:900;color:var(--purple);}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:20px;padding:4px 11px;font-size:.72rem;font-weight:700;color:var(--green);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.exit-btn{background:none;border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:'Cairo',sans-serif;font-size:.75rem;cursor:pointer;}
.filter-bar{display:flex;gap:7px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;}
.filter-bar::-webkit-scrollbar{height:3px;}
.ftab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;display:flex;align-items:center;gap:5px;}
.ftab.on{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:var(--purple);}
.ftab:not(.on){background:rgba(255,255,255,.04);color:var(--muted);border-color:rgba(255,255,255,.07);}
.fc{background:rgba(255,255,255,.1);border-radius:10px;padding:1px 7px;font-size:.67rem;}
.ftab.on .fc{background:rgba(168,85,247,.3);}
.wrap{max-width:720px;margin:0 auto;padding:14px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 6px;text-align:center;}
.sval{font-size:1.4rem;font-weight:900;}
.slbl{font-size:.62rem;color:var(--muted);margin-top:2px;}
.search-input{width:100%;background:#F8FAFC;border:1.5px solid rgba(255,255,255,0.07);border-radius:11px;padding:10px 15px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;direction:rtl;margin-bottom:13px;}
.search-input::placeholder{color:var(--muted);}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:17px;padding:17px;margin-bottom:12px;}
.ocard.c-sent{border-color:rgba(255,152,0,.35);}
.ocard.c-conf{border-color:rgba(0,201,255,.35);}
.ctop{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cid{font-size:.82rem;font-weight:900;color:var(--blue);background:rgba(0,201,255,.08);padding:3px 10px;border-radius:20px;}
.ctime{font-size:.67rem;color:var(--muted);margin-right:auto;}
.chip{padding:3px 11px;border-radius:20px;font-size:.68rem;font-weight:800;}
.ch-sent{background:rgba(255,152,0,.12);color:var(--orange);}
.ch-conf{background:rgba(0,201,255,.12);color:var(--blue);}
.ch-done{background:rgba(255,215,0,.12);color:var(--gold);}
.ch-cancel{background:rgba(255,68,68,.1);color:var(--red);}
.cbody{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:11px;}
.cf-lbl{font-size:.64rem;color:var(--muted);margin-bottom:1px;}
.cf-val{font-size:.85rem;font-weight:700;}
.cf-val.price{color:var(--gold);font-size:1.05rem;font-weight:900;}
.cf-s2{grid-column:1/-1;}
.btn-del{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.22);border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;flex:1;}
.btn-edit{background:rgba(0,201,255,.1);color:var(--blue);border:1px solid rgba(0,201,255,.22);border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;flex:1;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-90px);padding:11px 22px;border-radius:50px;font-weight:800;font-size:.84rem;z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);min-width:220px;text-align:center;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.7);}
.toast.on{transform:translateX(-50%) translateY(0);}
#loadingOverlay{position:fixed;inset:0;background:#F4F6FB;display:flex;align-items:center;justify-content:center;z-index:9999;}
.spinner{width:44px;height:44px;border:3px solid rgba(168,85,247,.15);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.empty{text-align:center;padding:50px 16px;color:var(--muted);}
.date-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.date-row input[type=date]{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.85rem;outline:none;flex:1;}
.date-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(168,85,247,.35);background:rgba(168,85,247,.1);color:var(--purple);font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}
.total-box{background:linear-gradient(135deg,rgba(0,230,118,.15),rgba(0,230,118,.05));border:1px solid rgba(0,230,118,.3);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-card{background:#F0F0FA;border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:380px;}
.modal-card h3{font-weight:900;margin-bottom:16px;color:var(--purple);}
.modal-input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;padding:11px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;direction:rtl;margin-bottom:12px;}
@media(max-width:500px){.stats-grid{grid-template-columns:repeat(2,1fr);}.cbody{grid-template-columns:1fr;}.cf-s2{grid-column:1;}}
</style>
</head>

    <div id="shopsList" style="display:none"></div>

      <input class="search-input" id="stSearch" placeholder="🔍 بحث باسم المندوب أو رقمه..." oninput="filterDriverSelect()" style="margin-bottom:10px;background:#F8FAFC;border:1.5px solid #E5E7EB;color:var(--text);"/>
      <select id="stDrv" style="width:100%;background:#F8FAFC;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;margin-bottom:10px;" onchange="renderStatement()">
        <option value="">-- اختر مندوب --</option>
      </select>
      <div class="date-row">
        <input type="date" id="stFrom" onchange="renderStatement()"/>
        <input type="date" id="stTo" onchange="renderStatement()"/>
        <button class="date-btn" onclick="stSetToday()">اليوم</button>
        <button class="date-btn" onclick="stSetWeek()">الأسبوع</button>
      </div>
      <div id="stTotal" style="display:none" class="total-box"></div>
      <div id="stList"></div>
    </div>
  </div>
</div>
<!-- Modal تعديل -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-card">
    <h3 id="modalTitle">تعديل</h3>
    <input class="modal-input" id="modalVal" placeholder="القيمة الجديدة"/>
    <div style="display:flex;gap:8px;">
      <button onclick="modalSave()" style="flex:1;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),#7C3AED);color:#fff;font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer;">حفظ</button>
      <button onclick="closeModal()" style="flex:1;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer;">إلغاء</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbwjyGroSoP1r0Z7wRAIDhAf88iuJX3GMC5ocvwMQ3VZnD564Bom4Otz3S0j6WUEGZ-q/exec';
const SUPER_PASS='super2024';
let curFilter='all',allOrders=[],allDrivers=[],allShops=[],pollTimer=null,aCtx=null,prevSentCount=-1,prevPendCount=-1;
let modalAction=null,modalId=null;

async function api(data){const r=await fetch(GAS,{method:'POST',body:JSON.stringify(data),redirect:'follow'});return r.json();}

function login(){
  if(document.getElementById('lpass').value!==SUPER_PASS){toast('❌ كلمة مرور خاطئة','#FF4444');return;}
  localStorage.setItem('super_auth','1');
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  startPoll();
}
function logout(){
  clearInterval(pollTimer);
  localStorage.removeItem('super_auth');
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('app').style.display='none';
}

function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(el=>el.classList.remove('on'));
  document.getElementById('f-'+f).classList.add('on');
  ['ordersList','driversList','shopsList','statementSec'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('searchInp').style.display='block';
  if(f==='drivers'){document.getElementById('driversList').style.display='block';document.getElementById('searchInp').style.display='none';renderDrivers();}
  else if(f==='shops'){document.getElementById('shopsList').style.display='block';renderShops();}
  else if(f==='statement'){document.getElementById('statementSec').style.display='block';document.getElementById('searchInp').style.display='none';populateDriverSelect();}
  else{document.getElementById('ordersList').style.display='block';renderOrders();}
}

function onSearch(){if(['all','sent','confirmed','delivered','cancelled'].includes(curFilter))renderOrders();else if(curFilter==='shops')renderShops();}

function startPoll(){loadData();pollTimer=setInterval(loadData,6000);}

async function loadData(){
  const r=await api({action:'getAllOrders',pass:SUPER_PASS});
  if(!r.ok)return;
  allOrders=r.orders||[];allDrivers=r.drivers||[];allShops=r.shops||[];
  const today=new Date().toDateString();
  const pend=allDrivers.filter(d=>String(d.approved)!=='true'&&String(d.approved)!=='TRUE').length;
  document.getElementById('s-sent').textContent=allOrders.filter(o=>o.status==='sent').length;
  document.getElementById('s-conf').textContent=allOrders.filter(o=>o.status==='confirmed').length;
  document.getElementById('s-done').textContent=allOrders.filter(o=>o.status==='delivered'&&new Date(o.ts).toDateString()===today).length;
  document.getElementById('s-pend').textContent=pend;
  document.getElementById('fc-drivers').textContent=pend>0?'⚠️'+pend:allDrivers.length;
  // إشعار لما يجي مندوب جديد
  if(prevPendCount>=0&&pend>prevPendCount){
    beep();
    toast('🛵 مندوب جديد يطلب الانضمام!','#7C3AED');
    document.getElementById('fc-drivers').style.background='rgba(229,57,53,.5)';
    document.getElementById('fc-drivers').style.animation='pulse 1s ease infinite';
  }
  if(pend===0)document.getElementById('fc-drivers').style.animation='';
  prevPendCount=pend;
  document.getElementById('fc-shops').textContent=allShops.length;
  ['all','sent','confirmed','delivered','cancelled'].forEach(s=>{
    const el=document.getElementById('fc-'+s);
    if(el)el.textContent=s==='all'?allOrders.length:allOrders.filter(o=>o.status===s).length;
  });
  const nowSent=allOrders.filter(o=>o.status==='sent').length;
  if(prevSentCount>=0&&nowSent>prevSentCount){beep();toast('📦 طلب جديد!','#FF9800');}
  prevSentCount=nowSent;
  if(curFilter==='drivers')renderDrivers();
  else if(curFilter==='shops')renderShops();
  else if(curFilter==='statement')renderStatement();
  else renderOrders();
}

// ═══ الطلبات ═══
function renderOrders(){
  const q=(document.getElementById('searchInp')?.value||'').toLowerCase();
  let list=allOrders.filter(o=>curFilter==='all'||o.status===curFilter)
    .filter(o=>!q||[o.id,o.shopName,o.area,o.custName,o.drvName].some(x=>String(x||'').toLowerCase().includes(q)))
    .sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const el=document.getElementById('ordersList');
  if(!list.length){el.innerHTML=`<div class="empty">لا يوجد نتائج</div>`;return;}
  const chips={sent:`<span class="chip ch-sent">📡 ينتظر</span>`,confirmed:`<span class="chip ch-conf">🛵 في الطريق</span>`,delivered:`<span class="chip ch-done">✅ مسلّم</span>`,cancelled:`<span class="chip ch-cancel">✕ ملغي</span>`};
  el.innerHTML=list.map(o=>`<div class="ocard ${o.status==='sent'?'c-sent':o.status==='confirmed'?'c-conf':''}">
    <div class="ctop"><span class="cid">${o.id}</span>${chips[o.status]||''}<span class="ctime">${ago(o.ts)}</span></div>
    <div style="background:rgba(168,85,247,.07);border-radius:9px;padding:8px 11px;margin-bottom:8px;font-size:.82rem;">🏪 ${o.shopName} — 📌 ${o.shopArea}</div>
    <div class="cbody">
      <div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div>
      <div><div class="cf-val price">${fmt(o.price)} د.ع</div></div>
      <div><div class="cf-lbl">الزبون</div><div class="cf-val">👤 ${o.custName} — ${o.custPhone}</div></div>
      <div class="cf-s2"><div class="cf-val" style="font-size:.8rem">🗺 ${o.addr}</div></div>
      ${o.drvName?`<div class="cf-s2"><div style="font-size:.82rem">🛵 ${o.drvName} — ${o.drvPhone}</div></div>`:''}
    </div>
    ${!['delivered','cancelled'].includes(o.status)?`<button class="btn-del" onclick="superCancel('${o.id}')">✕ إلغاء</button>`:''}
  </div>`).join('');
}

// ═══ المندوبين ═══
function renderDrivers(){
  const el=document.getElementById('driversList');
  if(!allDrivers.length){el.innerHTML=`<div class="empty">لا يوجد مندوبين</div>`;return;}
  el.innerHTML=allDrivers.map(d=>{
    const approved=String(d.approved)==='true'||String(d.approved)==='TRUE';
    return`<div style="background:var(--card);border:1px solid ${approved?'rgba(0,230,118,.25)':'rgba(255,152,0,.4)'};border-radius:15px;padding:16px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        ${d.photo?`<img src="${d.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid ${approved?'var(--green)':'var(--orange)'}"/>`:`<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">🛵</div>`}
        <div style="flex:1"><div style="font-weight:900">${d.name||'—'}</div><div style="color:var(--muted);font-size:.78rem">📞 ${d.phone}</div></div>
        <span style="padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:800;background:${approved?'rgba(0,230,118,.12)':'rgba(255,152,0,.12)'};color:${approved?'var(--green)':'var(--orange)'}">${approved?'✅ موافق':'⏳ بانتظار'}</span>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        ${!approved?`<button onclick="approveDriver('${d.id}')" style="flex:1;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#007A33);color:#000;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:900;cursor:pointer;">✅ موافقة</button>`:''}
        <button onclick="deleteDriver('${d.id}','${d.name}')" class="btn-del" style="flex:1;">🗑 حذف</button>
      </div>
    </div>`;
  }).join('');
}

async function approveDriver(id){
  const r=await api({action:'approveDriver',driverId:id,pass:SUPER_PASS});
  if(r.ok){toast('✅ تمت الموافقة','#00E676');loadData();}
}
async function deleteDriver(id,name){
  if(!confirm('حذف المندوب '+name+'؟'))return;
  const r=await api({action:'rejectDriver',driverId:id,pass:SUPER_PASS});
  if(r.ok){toast('🗑 تم الحذف','#FF4444');loadData();}
}

// ═══ المحلات ═══
function renderShops(){
  const q=(document.getElementById('searchInp')?.value||'').toLowerCase();
  const list=allShops.filter(s=>!q||[s.name,s.phone,s.area].some(x=>String(x||'').toLowerCase().includes(q)));
  const el=document.getElementById('shopsList');
  if(!list.length){el.innerHTML=`<div class="empty">لا يوجد محلات</div>`;return;}
  el.innerHTML=list.map(s=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:15px;padding:16px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div><div style="font-weight:900">${s.name}</div><div style="color:var(--muted);font-size:.78rem">📞 ${s.phone} — 📌 ${s.area}</div></div>
    </div>
    <div style="display:flex;gap:7px;">
      <button onclick="editShopPass('${s.id}','${s.name}')" class="btn-edit" style="flex:1;">🔑 تغيير الرمز</button>
      <button onclick="deleteShop('${s.id}','${s.name}')" class="btn-del" style="flex:1;">🗑 حذف</button>
    </div>
  </div>`).join('');
}

function editShopPass(id,name){
  modalAction='shopPass';modalId=id;
  document.getElementById('modalTitle').textContent='تغيير رمز: '+name;
  document.getElementById('modalVal').value='';
  document.getElementById('modal').style.display='flex';
}
async function deleteShop(id,name){
  if(!confirm('حذف محل '+name+'؟'))return;
  const r=await api({action:'deleteShop',shopId:id,pass:SUPER_PASS});
  if(r.ok){toast('🗑 تم الحذف','#FF4444');loadData();}
  else toast('❌ '+r.error,'#FF4444');
}
async function modalSave(){
  const val=document.getElementById('modalVal').value.trim();
  if(!val){toast('⚠️ أدخل القيمة','#FF9800');return;}
  if(modalAction==='shopPass'){
    const r=await api({action:'updateShopPass',shopId:modalId,pass:val,superPass:SUPER_PASS});
    if(r.ok){toast('✅ تم تغيير الرمز','#00E676');closeModal();loadData();}
    else toast('❌ '+r.error,'#FF4444');
  }
}
function closeModal(){document.getElementById('modal').style.display='none';modalAction=null;modalId=null;}

// ═══ كشف الحساب ═══
function filterDriverSelect(){
  const q=(document.getElementById('stSearch').value||'').toLowerCase();
  const sel=document.getElementById('stDrv');
  const prev=sel.value;
  sel.innerHTML='<option value="">-- اختر مندوب --</option>';
  allDrivers
    .filter(d=>String(d.approved)==='true'||String(d.approved)==='TRUE')
    .filter(d=>!q||String(d.name||'').toLowerCase().includes(q)||String(d.phone||'').includes(q))
    .forEach(d=>{sel.innerHTML+=`<option value="${d.id}">${d.name} — ${d.phone}</option>`;});
  if(prev)sel.value=prev;
}

function populateDriverSelect(){
  document.getElementById('stSearch').value='';
  filterDriverSelect();
}
function stSetToday(){
  const t=new Date().toISOString().split('T')[0];
  document.getElementById('stFrom').value=t;
  document.getElementById('stTo').value=t;
  renderStatement();
}
function stSetWeek(){
  const to=new Date(),from=new Date();from.setDate(from.getDate()-6);
  document.getElementById('stFrom').value=from.toISOString().split('T')[0];
  document.getElementById('stTo').value=to.toISOString().split('T')[0];
  renderStatement();
}
function renderStatement(){
  const drvId=document.getElementById('stDrv').value;
  const from=document.getElementById('stFrom').value;
  const to=document.getElementById('stTo').value;
  const el=document.getElementById('stList');
  const totEl=document.getElementById('stTotal');
  if(!drvId){el.innerHTML=`<div class="empty">اختر مندوباً أولاً</div>`;totEl.style.display='none';return;}
  let orders=allOrders.filter(o=>String(o.drvId)===drvId&&o.status==='delivered');
  if(from){orders=orders.filter(o=>{const d=new Date(o.ts).toISOString().split('T')[0];return d>=from;});}
  if(to){orders=orders.filter(o=>{const d=new Date(o.ts).toISOString().split('T')[0];return d<=to;});}
  orders.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const totalDel=orders.reduce((s,o)=>s+Number(String(o.deliveryPrice||0).replace(/,/g,'')),0);
  const totalOrd=orders.reduce((s,o)=>s+Number(String(o.price||0).replace(/,/g,'')),0);
  if(orders.length){
    totEl.style.display='block';
    totEl.innerHTML=`<div style="font-size:.78rem;color:var(--green);opacity:.8;margin-bottom:8px;">${orders.length} طلب مسلّم</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div><div style="font-size:.7rem;color:var(--muted);">إجمالي التوصيل</div><div style="font-size:1.3rem;font-weight:900;color:var(--green);">${fmt(totalDel)} د.ع</div></div>
      <div><div style="font-size:.7rem;color:var(--muted);">إجمالي الطلبات</div><div style="font-size:1.3rem;font-weight:900;color:var(--gold);">${fmt(totalOrd)} د.ع</div></div>
    </div>`;
  }else{totEl.style.display='none';}
  if(!orders.length){el.innerHTML=`<div class="empty">لا يوجد طلبات في هذه الفترة</div>`;return;}
  el.innerHTML=orders.map(o=>`<div class="ocard">
    <div class="ctop"><span class="cid">${o.id}</span><span class="chip ch-done">✅ مسلّم</span><span class="ctime">${ago(o.ts)}</span></div>
    <div style="background:rgba(168,85,247,.07);border-radius:9px;padding:7px 11px;margin-bottom:8px;font-size:.82rem;">🏪 ${o.shopName} — 📌 ${o.shopArea}</div>
    <div class="cbody">
      <div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div>
      <div><div class="cf-lbl">سعر الطلب</div><div class="cf-val price">${fmt(o.price)} د.ع</div></div>
      <div><div class="cf-lbl">سعر التوصيل</div><div class="cf-val" style="color:var(--green);font-weight:900;">${fmt(o.deliveryPrice||0)} د.ع</div></div>
      <div><div class="cf-lbl">الزبون</div><div class="cf-val">${o.custName}</div></div>
      <div class="cf-s2"><div style="font-size:.76rem;color:var(--muted);">${new Date(o.ts).toLocaleDateString('ar-IQ')}</div></div>
    </div>
  </div>`).join('');
}

async function superCancel(id){
  if(!confirm('إلغاء؟'))return;
  await api({action:'superCancel',orderId:id,pass:SUPER_PASS});
  toast('✕ تم الإلغاء','#FF4444');loadData();
}

function fmt(n){const x=Number(String(n).replace(/,/g,''));return isNaN(x)?'0':x.toLocaleString('ar-IQ');}
function ago(ts){const m=Math.floor((Date.now()-new Date(ts))/60000);return m<1?'الآن':m<60?`${m} دق`:m<1440?`${Math.floor(m/60)} س`:`${Math.floor(m/1440)} يوم`;}
let tt=null;
function toast(msg,bg){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg||'#A855F7';t.style.color='#fff';t.classList.add('on');if(tt)clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),3200);}
function beep(){try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();[520,660,800].forEach((f,i)=>{const o=aCtx.createOscillator(),g=aCtx.createGain();o.connect(g);g.connect(aCtx.destination);o.frequency.value=f;const t=aCtx.currentTime+i*.14;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}}
document.addEventListener('click',()=>{try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},{once:true});
(function(){
  document.getElementById('loadingOverlay').style.display='none';
  if(localStorage.getItem('super_auth')==='1'){
    document.getElementById('app').style.display='block';
    startPoll();
  } else {
    document.getElementById('loginWrap').style.display='flex';
  }
})();
</script>
</body>
</html>
