<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أمواج — المراقبة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--purple:#A855F7;--bg:#08080F;--card:#10101E;--card2:#181828;--green:#00E676;--red:#FF4444;--blue:#00C9FF;--orange:#FF9800;--gold:#FFD700;--text:#F0F0F0;--muted:#5555AA;--border:rgba(168,85,247,0.15);}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.8);}
.lcard h2{font-size:1.5rem;font-weight:900;color:var(--purple);margin-bottom:5px;}
.lcard p{color:var(--muted);font-size:.83rem;margin-bottom:28px;}
input[type="password"]{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 18px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.95rem;margin-bottom:14px;outline:none;transition:all .25s;direction:rtl;text-align:center;}
input[type="password"]:focus{border-color:var(--purple);}
.btn-purple{width:100%;background:linear-gradient(135deg,var(--purple),#7C3AED);color:#fff;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;}
#app{display:none;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.tb-title{font-size:.95rem;font-weight:900;color:var(--purple);}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:20px;padding:4px 11px;font-size:.72rem;font-weight:700;color:var(--green);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.exit-btn{background:none;border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:'Cairo',sans-serif;font-size:.75rem;cursor:pointer;}
.filter-bar{display:flex;gap:7px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;}
.ftab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;display:flex;align-items:center;gap:5px;}
.ftab.on{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:var(--purple);}
.ftab:not(.on){background:rgba(255,255,255,.04);color:var(--muted);border-color:rgba(255,255,255,.07);}
.fc{background:rgba(255,255,255,.1);border-radius:10px;padding:1px 7px;font-size:.67rem;}
.ftab.on .fc{background:rgba(168,85,247,.3);}
.wrap{max-width:720px;margin:0 auto;padding:14px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 6px;text-align:center;}
.sval{font-size:1.4rem;font-weight:900;}
.slbl{font-size:.62rem;color:var(--muted);margin-top:2px;}
.search-input{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.07);border-radius:11px;padding:10px 15px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;direction:rtl;margin-bottom:13px;}
.search-input::placeholder{color:var(--muted);}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:17px;padding:17px;margin-bottom:12px;}
.ocard.c-sent{border-color:rgba(255,152,0,.35);}
.ocard.c-conf{border-color:rgba(0,201,255,.35);}
.ocard.c-done{opacity:.8;}
.ctop{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cid{font-size:.82rem;font-weight:900;color:var(--blue);background:rgba(0,201,255,.08);padding:3px 10px;border-radius:20px;}
.ctime{font-size:.67rem;color:var(--muted);margin-right:auto;}
.chip{padding:3px 11px;border-radius:20px;font-size:.68rem;font-weight:800;}
.ch-sent{background:rgba(255,152,0,.12);color:var(--orange);}
.ch-conf{background:rgba(0,201,255,.12);color:var(--blue);}
.ch-done{background:rgba(255,215,0,.12);color:var(--gold);}
.ch-cancel{background:rgba(255,68,68,.1);color:var(--red);}
.cbody{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:11px;}
.cf-lbl{font-size:.64rem;color:var(--muted);margin-bottom:1px;}
.cf-val{font-size:.85rem;font-weight:700;}
.cf-val.price{color:var(--gold);font-size:1.05rem;font-weight:900;}
.cf-s2{grid-column:1/-1;}
.btn-cancel{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.22);border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;width:100%;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-90px);padding:11px 22px;border-radius:50px;font-weight:800;font-size:.84rem;z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);min-width:220px;text-align:center;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.7);}
.toast.on{transform:translateX(-50%) translateY(0);}
#loadingOverlay{position:fixed;inset:0;background:#08080F;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px;}
.spinner{width:44px;height:44px;border:3px solid rgba(168,85,247,.15);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 16px;color:var(--muted);}
@media(max-width:500px){.stats-grid{grid-template-columns:repeat(2,1fr);}.cbody{grid-template-columns:1fr;}.cf-s2{grid-column:1;}}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="loginWrap" style="display:none">
  <div class="lcard">
    <div style="font-size:3rem;margin-bottom:12px">👁️</div>
    <h2>مركز المراقبة</h2>
    <p>صفحتك الخاصة</p>
    <input type="password" id="lpass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-purple" onclick="login()">دخول</button>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.6rem">👁️</span>
      <div><div class="tb-title">مركز المراقبة</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="live-badge"><div class="live-dot"></div>مباشر</div>
      <button class="exit-btn" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="filter-bar">
    <div class="ftab on" id="f-all"       onclick="setFilter('all')">🌐 الكل <span class="fc" id="fc-all">0</span></div>
    <div class="ftab"    id="f-sent"      onclick="setFilter('sent')">📡 ينتظر <span class="fc" id="fc-sent">0</span></div>
    <div class="ftab"    id="f-confirmed" onclick="setFilter('confirmed')">🛵 في الطريق <span class="fc" id="fc-confirmed">0</span></div>
    <div class="ftab"    id="f-delivered" onclick="setFilter('delivered')">✅ مسلّمة <span class="fc" id="fc-delivered">0</span></div>
    <div class="ftab"    id="f-cancelled" onclick="setFilter('cancelled')">✕ ملغية <span class="fc" id="fc-cancelled">0</span></div>
    <div class="ftab"    id="f-drivers"   onclick="setFilter('drivers')">🛵 المندوبين <span class="fc" id="fc-drivers" style="background:rgba(255,68,68,.4)">0</span></div>
  </div>
  <div class="wrap">
    <div class="stats-grid">
      <div class="sbox"><div class="sval" id="s-sent" style="color:var(--orange)">0</div><div class="slbl">ينتظر</div></div>
      <div class="sbox"><div class="sval" id="s-conf" style="color:var(--blue)">0</div><div class="slbl">في الطريق</div></div>
      <div class="sbox"><div class="sval" id="s-done" style="color:var(--gold)">0</div><div class="slbl">مسلّمة اليوم</div></div>
      <div class="sbox"><div class="sval" id="s-drv"  style="color:var(--red)">0</div><div class="slbl">بانتظار الموافقة</div></div>
    </div>
    <input class="search-input" id="searchInp" placeholder="🔍 بحث..." oninput="renderOrders()"/>
    <div id="ordersList"></div>
    <div id="driversList" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbwjyGroSoP1r0Z7wRAIDhAf88iuJX3GMC5ocvwMQ3VZnD564Bom4Otz3S0j6WUEGZ-q/exec';
const SUPER_PASS='super2024';
let curFilter='all', allOrders=[], allDrivers=[], pollTimer=null, aCtx=null, prevSentCount=-1;

async function api(data){
  const r=await fetch(GAS,{method:'POST',body:JSON.stringify(data),redirect:'follow'});
  return r.json();
}

function login(){
  if(document.getElementById('lpass').value!==SUPER_PASS){toast('❌ كلمة مرور خاطئة','#FF4444','#fff');return;}
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  startPoll();
}

function logout(){clearInterval(pollTimer);document.getElementById('loginWrap').style.display='flex';document.getElementById('app').style.display='none';}

function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(el=>el.classList.remove('on'));
  document.getElementById('f-'+f).classList.add('on');
  const isDrivers=f==='drivers';
  document.getElementById('ordersList').style.display=isDrivers?'none':'block';
  document.getElementById('driversList').style.display=isDrivers?'block':'none';
  document.getElementById('searchInp').style.display=isDrivers?'none':'block';
  if(isDrivers)renderDrivers();else renderOrders();
}

function startPoll(){loadData();pollTimer=setInterval(loadData,5000);}

async function loadData(){
  const r=await api({action:'getAllOrders',pass:SUPER_PASS});
  if(!r.ok)return;
  allOrders=r.orders||[];
  allDrivers=r.drivers||[];
  const today=new Date().toDateString();
  const pending=allDrivers.filter(d=>String(d.approved)!=='true'&&String(d.approved)!=='TRUE').length;
  document.getElementById('s-sent').textContent=allOrders.filter(o=>o.status==='sent').length;
  document.getElementById('s-conf').textContent=allOrders.filter(o=>o.status==='confirmed').length;
  document.getElementById('s-done').textContent=allOrders.filter(o=>o.status==='delivered'&&new Date(o.ts).toDateString()===today).length;
  document.getElementById('s-drv').textContent=pending;
  ['all','sent','confirmed','delivered','cancelled'].forEach(s=>{
    const el=document.getElementById('fc-'+s);
    if(el)el.textContent=s==='all'?allOrders.length:allOrders.filter(o=>o.status===s).length;
  });
  document.getElementById('fc-drivers').textContent=pending>0?pending+'⚠️':allDrivers.length;
  const nowSent=allOrders.filter(o=>o.status==='sent').length;
  if(prevSentCount>=0&&nowSent>prevSentCount){beep();toast('📦 طلب جديد!','#FF9800','#000');}
  prevSentCount=nowSent;
  if(curFilter==='drivers')renderDrivers();else renderOrders();
}

function renderOrders(){
  const q=(document.getElementById('searchInp')?.value||'').toLowerCase();
  let list=allOrders
    .filter(o=>curFilter==='all'||o.status===curFilter)
    .filter(o=>{
      if(!q)return true;
      return String(o.id).toLowerCase().includes(q)||String(o.shopName).toLowerCase().includes(q)||
             String(o.area).toLowerCase().includes(q)||String(o.custName).toLowerCase().includes(q)||
             String(o.drvName).toLowerCase().includes(q);
    })
    .sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const el=document.getElementById('ordersList');
  if(!list.length){el.innerHTML=`<div class="empty">لا يوجد نتائج</div>`;return;}
  el.innerHTML=list.map(o=>{
    const chips={sent:`<span class="chip ch-sent">📡 ينتظر</span>`,confirmed:`<span class="chip ch-conf">🛵 في الطريق</span>`,delivered:`<span class="chip ch-done">✅ مسلّم</span>`,cancelled:`<span class="chip ch-cancel">✕ ملغي</span>`};
    const drvRow=o.drvName?`<div style="background:var(--card2);border-radius:9px;padding:8px 11px;margin-bottom:8px;font-size:.82rem;">🛵 ${o.drvName} — 📞 ${o.drvPhone}</div>`:'';
    const cls=o.status==='sent'?'c-sent':o.status==='confirmed'?'c-conf':o.status==='delivered'?'c-done':'';
    return`<div class="ocard ${cls}">
      <div class="ctop"><span class="cid">${o.id}</span>${chips[o.status]||''}<span class="ctime">${ago(o.ts)}</span></div>
      <div style="background:rgba(168,85,247,.07);border-radius:9px;padding:8px 11px;margin-bottom:8px;font-size:.82rem;">🏪 ${o.shopName} — 📌 ${o.shopArea}</div>
      <div class="cbody">
        <div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div>
        <div><div class="cf-val price">${fmt(o.price)} د.ع</div></div>
        <div><div class="cf-lbl">الزبون</div><div class="cf-val">👤 ${o.custName}</div></div>
        <div><div class="cf-val">📞 ${o.custPhone}</div></div>
        <div class="cf-s2"><div class="cf-val" style="font-size:.8rem">🗺 ${o.addr}</div></div>
      </div>${drvRow}
      ${!['delivered','cancelled'].includes(o.status)?`<button class="btn-cancel" onclick="superCancel('${o.id}')">✕ إلغاء</button>`:''}
    </div>`;
  }).join('');
}

function renderDrivers(){
  const el=document.getElementById('driversList');
  if(!allDrivers.length){el.innerHTML=`<div class="empty">لا يوجد مندوبين</div>`;return;}
  el.innerHTML=allDrivers.map(d=>{
    const approved=String(d.approved)==='true'||String(d.approved)==='TRUE';
    return`<div style="background:var(--card);border:1px solid ${approved?'rgba(0,230,118,.3)':'rgba(255,152,0,.4)'};border-radius:15px;padding:16px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          ${d.photo?`<img src="${d.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid ${approved?'var(--green)':'var(--orange)'}"/>`:`<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">🛵</div>`}
          <div>
            <div style="font-weight:900;font-size:.95rem">${d.name||'—'}</div>
            <div style="color:var(--muted);font-size:.78rem;margin-top:3px">📞 ${d.phone}</div>
          </div>
        </div>
        <span style="padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:800;background:${approved?'rgba(0,230,118,.12)':'rgba(255,152,0,.12)'};color:${approved?'var(--green)':'var(--orange)'}">
          ${approved?'✅ موافق':'⏳ بانتظار'}
        </span>
      </div>
      ${!approved?`<div style="display:flex;gap:8px;">
        <button onclick="approveDriver('${d.id}')" style="flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#007A33);color:#000;font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:900;cursor:pointer;">✅ موافقة</button>
        <button onclick="rejectDriver('${d.id}')" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,68,68,.3);background:rgba(255,68,68,.1);color:var(--red);font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;">✕ رفض</button>
      </div>`:
      `<div style="color:var(--muted);font-size:.76rem;text-align:center;">مندوب معتمد ✅</div>`}
    </div>`;
  }).join('');
}

async function approveDriver(id){
  const r=await api({action:'approveDriver',driverId:id,pass:SUPER_PASS});
  if(r.ok){toast('✅ تمت الموافقة','#00E676','#000');loadData();}
  else toast('❌ '+r.error,'#FF4444','#fff');
}

async function rejectDriver(id){
  if(!confirm('حذف هذا المندوب؟'))return;
  const r=await api({action:'rejectDriver',driverId:id,pass:SUPER_PASS});
  if(r.ok){toast('✕ تم الرفض','#FF4444','#fff');loadData();}
}

async function superCancel(id){
  if(!confirm('إلغاء؟'))return;
  await api({action:'superCancel',orderId:id,pass:SUPER_PASS});
  toast('✕ تم الإلغاء','#FF4444','#fff');loadData();
}

function fmt(n){const num=Number(String(n).replace(/,/g,''));return isNaN(num)?'0':num.toLocaleString('ar-IQ');}
function ago(ts){const m=Math.floor((Date.now()-new Date(ts))/60000);return m<1?'الآن':m<60?`${m} دق`:m<1440?`${Math.floor(m/60)} س`:`${Math.floor(m/1440)} يوم`;}
let tt=null;
function toast(msg,bg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg;t.style.color=color||'#000';t.classList.add('on');if(tt)clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),3200);}
function beep(){try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();[520,660,800].forEach((f,i)=>{const o=aCtx.createOscillator(),g=aCtx.createGain();o.connect(g);g.connect(aCtx.destination);o.frequency.value=f;const t=aCtx.currentTime+i*.14;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}}
document.addEventListener('click',()=>{try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},{once:true});

(function(){
  document.getElementById('loadingOverlay').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
})();
</script>
</body>
</html>
