<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أمواج — لوحة المحل</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#E6A800;--bg:#F0F4F8;--card:#FFFFFF;--card2:#E8EFF5;--green:#00A846;--red:#E53935;--blue:#0088CC;--orange:#F57C00;--text:#1A1A2E;--muted:#6B7280;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
input,select,textarea{width:100%;background:#F8FAFC;border:1.5px solid #D1D5DB;border-radius:11px;padding:12px 15px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.93rem;margin-bottom:12px;outline:none;transition:all .25s;direction:rtl;}
input:focus,select:focus,textarea:focus{border-color:var(--orange);}
textarea{min-height:60px;resize:none;}
.lbl{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;}
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;}
.btn-orange{background:linear-gradient(135deg,var(--orange),#E53935);color:#fff;}
.btn-gold{background:linear-gradient(135deg,#F9A825,#E65100);color:#fff;}
.btn-ghost-red{background:rgba(229,57,53,.1);color:var(--red);border:1px solid rgba(229,57,53,.25);}
.btn:disabled{background:#ccc!important;color:#888!important;cursor:not-allowed;}
#authWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:var(--card);border:1px solid #E5E7EB;border-radius:22px;padding:36px 28px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-logo{text-align:center;margin-bottom:20px;}
.auth-logo h2{font-size:1.4rem;font-weight:900;color:var(--orange);margin-top:8px;}
.tab-btns{display:flex;gap:8px;margin-bottom:20px;}
.tab-btn{flex:1;padding:10px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;border:2px solid #E5E7EB;background:#F8FAFC;color:var(--muted);transition:all .2s;}
.tab-btn.on{border-color:var(--orange);background:rgba(245,124,0,.08);color:var(--orange);}
#app{display:none;}
.topbar{background:var(--card);border-bottom:1px solid #E5E7EB;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tb-name{font-size:.92rem;font-weight:900;color:var(--orange);}
.tb-sub{font-size:.66rem;color:var(--muted);}
.exit-btn{background:none;border:1px solid #D1D5DB;color:var(--muted);border-radius:8px;padding:5px 11px;font-family:'Cairo',sans-serif;font-size:.74rem;cursor:pointer;}
.tabs{display:flex;background:var(--card);border-bottom:1px solid #E5E7EB;}
.tab{flex:1;padding:12px 4px;text-align:center;font-weight:700;font-size:.78rem;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;}
.tab.on{color:var(--orange);border-bottom-color:var(--orange);}
.wrap{max-width:660px;margin:0 auto;padding:14px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:15px;}
.sbox{background:var(--card);border:1px solid #E5E7EB;border-radius:12px;padding:12px 6px;text-align:center;}
.sval{font-size:1.4rem;font-weight:900;}
.slbl{font-size:.62rem;color:var(--muted);margin-top:2px;}
.order-form{background:var(--card);border:1px solid #FCD34D;border-radius:18px;padding:18px;margin-bottom:15px;}
.panel-title{font-size:.78rem;font-weight:900;color:var(--orange);margin-bottom:14px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
.fg .s2{grid-column:1/-1;}
.sec-hd{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid #E5E7EB;}
.ocard{background:var(--card);border:1px solid #E5E7EB;border-radius:15px;padding:16px;margin-bottom:11px;}
.ocard.c-sent{border-color:rgba(245,124,0,.4);}
.ocard.c-conf{border-color:rgba(0,168,70,.4);}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:5px;}
.cid{font-size:.82rem;font-weight:800;color:var(--blue);}
.ctime{font-size:.68rem;color:var(--muted);}
.chip{padding:3px 11px;border-radius:20px;font-size:.68rem;font-weight:800;}
.ch-sent{background:rgba(245,124,0,.12);color:var(--orange);}
.ch-conf{background:rgba(0,168,70,.12);color:var(--green);}
.ch-done{background:rgba(249,168,37,.12);color:#E6A800;}
.ch-cancel{background:rgba(229,57,53,.1);color:var(--red);}
.cbody{display:grid;grid-template-columns:1fr 1fr;gap:7px 12px;margin-bottom:10px;}
.cf-lbl{font-size:.66rem;color:var(--muted);margin-bottom:1px;}
.cf-val{font-size:.86rem;font-weight:700;}
.cf-val.price{color:var(--orange);font-size:1.05rem;font-weight:900;}
.cf-s2{grid-column:1/-1;}
.drv-row{display:flex;align-items:center;gap:11px;background:#F0FDF4;border:1px solid rgba(0,168,70,.2);border-radius:11px;padding:11px 13px;margin-bottom:10px;}
.wa-btn{display:flex;align-items:center;gap:4px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;border-radius:8px;padding:5px 9px;font-size:.71rem;font-weight:800;text-decoration:none;}
.cactions{display:flex;gap:7px;}
.cactions .btn{padding:10px 8px;font-size:.8rem;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-90px);padding:11px 22px;border-radius:50px;font-weight:800;font-size:.84rem;z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);min-width:220px;text-align:center;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.2);}
.toast.on{transform:translateX(-50%) translateY(0);}
#loadingOverlay{position:fixed;inset:0;background:#F0F4F8;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px;}
.spinner{width:44px;height:44px;border:3px solid rgba(245,124,0,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:42px 16px;color:var(--muted);}
.empty-ico{font-size:46px;opacity:.3;margin-bottom:10px;}
@media(max-width:460px){.stats{grid-template-columns:repeat(2,1fr);}.fg{grid-template-columns:1fr;}.fg .s2{grid-column:1;}.cbody{grid-template-columns:1fr;}.cf-s2{grid-column:1;}}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><p style="color:var(--muted);font-size:.85rem">جاري التحميل...</p></div>
<div id="authWrap" style="display:none">
  <div class="auth-card">
    <div class="auth-logo"><div style="font-size:2.8rem">🏪</div><h2>أمواج للتوصيل</h2><p style="color:var(--muted);font-size:.82rem">لوحة تحكم المحل</p></div>
    <div class="tab-btns">
      <button class="tab-btn on" id="tbLogin" onclick="showAuthTab('login')">دخول</button>
      <button class="tab-btn" id="tbReg" onclick="showAuthTab('register')">تسجيل جديد</button>
    </div>
    <div id="loginForm">
      <span class="lbl">رقم الهاتف</span><input type="tel" id="lPhone" placeholder="07xxxxxxxxx" maxlength="11"/>
      <span class="lbl">كلمة المرور</span><input type="password" id="lPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn btn-gold" onclick="doLogin()">🔑 دخول</button>
    </div>
    <div id="registerForm" style="display:none">
      <span class="lbl">اسم المحل</span><input type="text" id="rName" placeholder="أمواج للإلكترونيات"/>
      <span class="lbl">رقم الهاتف</span><input type="tel" id="rPhone" placeholder="07xxxxxxxxx" maxlength="11"/>
      <span class="lbl">المنطقة</span><input type="text" id="rArea" placeholder="الكرامة"/>
      <span class="lbl">كلمة المرور</span><input type="password" id="rPass" placeholder="اختر كلمة مرور"/>
      <button class="btn btn-gold" onclick="doRegister()">✅ تسجيل</button>
    </div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.4rem">🏪</span>
      <div><div class="tb-name" id="topName">--</div><div class="tb-sub" id="topSub">--</div></div>
    </div>
    <button class="exit-btn" onclick="doLogout()">خروج</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="t1" onclick="goTab(1)">📋 الطلبات</div>
    <div class="tab" id="t2" onclick="goTab(2)">✅ المنجزة</div>
  </div>
  <div class="wrap">
    <div class="stats">
      <div class="sbox"><div class="sval" id="s1" style="color:var(--orange)">0</div><div class="slbl">ينتظر</div></div>
      <div class="sbox"><div class="sval" id="s2" style="color:var(--green)">0</div><div class="slbl">في الطريق</div></div>
      <div class="sbox"><div class="sval" id="s3" style="color:#E6A800">0</div><div class="slbl">مسلّمة اليوم</div></div>
    </div>
    <!-- فورم الطلب ثابت هنا — ما يُعاد رسمه -->
    <div class="order-form">
      <div class="panel-title">➕ طلب توصيل جديد</div>
      <div class="fg">
        <div><span class="lbl">المنطقة</span><select id="fArea">
          <option value="">-- اختر --</option>
          <option>العباسية</option><option>الحر</option><option>الملتقى</option><option>العلوي</option>
          <option>الكرامة</option><option>المرحلة</option><option>الحسينية</option><option>الروضة</option>
          <option>باب الخان</option><option>الجديدة</option><option>طويريج</option><option>أخرى</option>
        </select></div>
        <div><span class="lbl">المبلغ (دينار)</span><input type="number" id="fPrice" placeholder="0"/></div>
        <div class="s2"><span class="lbl">العنوان</span><textarea id="fAddr" placeholder="الشارع، قرب..."></textarea></div>
        <div><span class="lbl">اسم الزبون</span><input type="text" id="fName" placeholder="الاسم"/></div>
        <div><span class="lbl">هاتف الزبون</span><input type="tel" id="fPhone" placeholder="07xxxxxxxxx" maxlength="11"/></div>
        <div class="s2"><span class="lbl">ملاحظة</span><input type="text" id="fNote" placeholder="اختياري..."/></div>
      </div>
      <button class="btn btn-orange" id="sendBtn" onclick="sendOrder()">🛵 إرسال للمندوبين</button>
    </div>
    <div id="tc1"></div>
    <div id="tc2" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbwjyGroSoP1r0Z7wRAIDhAf88iuJX3GMC5ocvwMQ3VZnD564Bom4Otz3S0j6WUEGZ-q/exec';
let shop=null,curtab=1,pollTimer=null,lastConf=-1,aCtx=null;

async function api(data){
  const r=await fetch(GAS,{method:'POST',body:JSON.stringify(data),redirect:'follow'});
  return r.json();
}

function showAuthTab(t){
  document.getElementById('tbLogin').className='tab-btn'+(t==='login'?' on':'');
  document.getElementById('tbReg').className='tab-btn'+(t==='register'?' on':'');
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
}

async function doLogin(){
  const phone=v('lPhone'),pass=v('lPass');
  if(!phone||!pass){toast('⚠️ أكمل البيانات','#F57C00');return;}
  const r=await api({action:'loginShop',phone,pass});
  if(!r.ok){toast('❌ '+r.error,'#E53935');return;}
  enterApp(r.shop);
}

async function doRegister(){
  const name=v('rName'),phone=v('rPhone'),area=v('rArea'),pass=v('rPass');
  if(!name||!phone||!area||!pass){toast('⚠️ أكمل الحقول','#F57C00');return;}
  const r=await api({action:'registerShop',name,phone,area,pass});
  if(!r.ok){toast('❌ '+r.error,'#E53935');return;}
  enterApp(r.shop);
}

function enterApp(s){
  shop=s;localStorage.setItem('amwaj_shop',JSON.stringify(s));
  document.getElementById('authWrap').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topName').textContent=s.name;
  document.getElementById('topSub').textContent=s.area+' — '+s.phone;
  startPoll();
  if('Notification'in window)Notification.requestPermission();
}

function doLogout(){
  clearInterval(pollTimer);shop=null;
  localStorage.removeItem('amwaj_shop');
  document.getElementById('app').style.display='none';
  document.getElementById('authWrap').style.display='flex';
}

function goTab(n){
  curtab=n;
  [1,2].forEach(i=>{
    document.getElementById('t'+i).className='tab'+(i===n?' on':'');
    document.getElementById('tc'+i).style.display=i===n?'block':'none';
  });
  loadOrders();
}

function startPoll(){loadOrders();pollTimer=setInterval(loadOrders,5000);}

async function loadOrders(){
  if(!shop)return;
  const r=await api({action:'getOrders',shopId:shop.id});
  if(!r.ok)return;
  const orders=r.orders||[];
  const today=new Date().toDateString();
  document.getElementById('s1').textContent=orders.filter(o=>o.status==='sent').length;
  document.getElementById('s2').textContent=orders.filter(o=>o.status==='confirmed').length;
  document.getElementById('s3').textContent=orders.filter(o=>o.status==='delivered'&&new Date(o.ts).toDateString()===today).length;
  const conf=orders.filter(o=>o.status==='confirmed').length;
  if(lastConf>=0&&conf>lastConf){beep();toast('🛵 مندوب في الطريق!','#00A846');}
  lastConf=conf;
  // تحديث الطلبات فقط — الفورم ثابت بالـ HTML
  if(curtab===1)renderOrders(orders.filter(o=>!['delivered','cancelled'].includes(o.status)));
  if(curtab===2)renderDone(orders.filter(o=>['delivered','cancelled'].includes(o.status)));
}

function renderOrders(active){
  const el=document.getElementById('tc1');
  if(!active.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📭</div><p>لا يوجد طلبات نشطة</p></div>`;return;}
  el.innerHTML=`<div class="sec-hd">الطلبات النشطة (${active.length})</div>`+active.map(buildCard).join('');
}

function renderDone(done){
  const el=document.getElementById('tc2');
  if(!done.length){el.innerHTML=`<div class="empty"><div class="empty-ico">✅</div><p>لا يوجد منجزة</p></div>`;return;}
  el.innerHTML=done.map(o=>{
    const chip=o.status==='delivered'?`<span class="chip ch-done">✅ مسلّم</span>`:`<span class="chip ch-cancel">✕ ملغي</span>`;
    return`<div class="ocard"><div class="ctop"><span class="cid">${o.id}</span>${chip}<span class="ctime">${ago(o.ts)}</span></div>
    <div class="cbody"><div><div class="cf-val">📍 ${o.area}</div></div><div><div class="cf-val price">${fmt(o.price)} د.ع</div></div></div></div>`;
  }).join('');
}

function buildCard(o){
  const chip=o.status==='sent'?`<span class="chip ch-sent">📡 ينتظر</span>`:`<span class="chip ch-conf">🛵 في الطريق</span>`;
  let drv='';
  if(o.drvName&&o.status==='confirmed'){
    const wa=`https://wa.me/964${(o.drvPhone||'').replace(/^0/,'')}?text=${encodeURIComponent('مرحباً '+o.drvName+' — طلب '+o.id)}`;
    const hasLoc=o.drvLat&&o.drvLng&&String(o.drvLat)!==''&&String(o.drvLng)!=='';
    const mapsLink=hasLoc?`https://maps.google.com/?q=${o.drvLat},${o.drvLng}`:'';
    drv=`<div class="drv-row">
      <span style="font-size:1.8rem">🛵</span>
      <div style="flex:1">
        <div style="font-weight:900;font-size:.95rem">${o.drvName}</div>
        <div style="color:var(--muted);font-size:.77rem;margin-top:2px">📞 ${o.drvPhone}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        <a href="${wa}" target="_blank" class="wa-btn">💬 واتساب</a>
        ${hasLoc?`<a href="${mapsLink}" target="_blank" style="display:flex;align-items:center;gap:4px;background:rgba(0,136,204,.1);border:1px solid rgba(0,136,204,.25);color:var(--blue);border-radius:8px;padding:5px 9px;font-size:.71rem;font-weight:800;text-decoration:none;">📍 موقعه</a>`:''}
      </div>
    </div>`;
  }
  return`<div class="ocard ${o.status==='sent'?'c-sent':'c-conf'}">
    <div class="ctop"><span class="cid">${o.id}</span>${chip}<span class="ctime">${ago(o.ts)}</span></div>
    <div class="cbody">
      <div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div>
      <div><div class="cf-lbl">المبلغ</div><div class="cf-val price">${fmt(o.price)} د.ع</div></div>
      <div><div class="cf-lbl">الزبون</div><div class="cf-val">👤 ${o.custName}</div></div>
      <div><div class="cf-val">📞 ${o.custPhone}</div></div>
      <div class="cf-s2"><div class="cf-val" style="font-size:.8rem">🗺 ${o.addr}</div></div>
      ${o.note?`<div class="cf-s2"><div class="cf-val" style="font-size:.8rem">📝 ${o.note}</div></div>`:''}
    </div>${drv}
    <div class="cactions"><button class="btn btn-ghost-red" onclick="cancelOrder('${o.id}')">✕ إلغاء</button></div>
  </div>`;
}

async function sendOrder(){
  const area=v('fArea'),addr=v('fAddr'),price=v('fPrice'),custName=v('fName'),custPhone=v('fPhone'),note=v('fNote');
  if(!area||!addr||!price||+price<=0||!custName||!custPhone||custPhone.length<10){toast('⚠️ أكمل الحقول','#F57C00');return;}
  const btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent='⏳ جاري...';
  const r=await api({action:'sendOrder',shopId:shop.id,shopName:shop.name,shopPhone:shop.phone,shopArea:shop.area,area,addr,price,custName,custPhone,note});
  btn.disabled=false;btn.innerHTML='🛵 إرسال للمندوبين';
  if(!r.ok){toast('❌ '+r.error,'#E53935');return;}
  // مسح الفورم بعد الإرسال
  ['fArea','fPrice','fAddr','fName','fPhone','fNote'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.value='';
  });
  toast('📡 تم الإرسال — إشعار تلغرام للمندوبين','#F57C00');
  loadOrders();
}

async function cancelOrder(id){
  if(!confirm('إلغاء هذا الطلب؟'))return;
  await api({action:'cancelOrder',orderId:id});
  toast('✕ تم الإلغاء','#E53935');loadOrders();
}

function v(id){return document.getElementById(id)?.value||'';}
function fmt(n){return Number(n).toLocaleString('ar-IQ');}
function ago(ts){const m=Math.floor((Date.now()-new Date(ts))/60000);return m<1?'الآن':m<60?`${m} دق`:m<1440?`${Math.floor(m/60)} س`:`${Math.floor(m/1440)} يوم`;}
let tt=null;
function toast(msg,bg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg||'#F57C00';t.style.color=color||'#fff';t.classList.add('on');if(tt)clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),3200);}
function beep(){try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();[520,660,800].forEach((f,i)=>{const o=aCtx.createOscillator(),g=aCtx.createGain();o.connect(g);g.connect(aCtx.destination);o.frequency.value=f;const t=aCtx.currentTime+i*.14;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}}
document.addEventListener('click',()=>{try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},{once:true});

(function(){
  const s=localStorage.getItem('amwaj_shop');
  if(s)enterApp(JSON.parse(s));
  else document.getElementById('authWrap').style.display='flex';
  document.getElementById('loadingOverlay').style.display='none';
})();
</script>
</body>
</html>
