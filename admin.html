<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أمواج — لوحة المحل</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="أمواج محل">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#E6A800;--bg:#F0F4F8;--card:#FFFFFF;--card2:#E8EFF5;
  --green:#00A846;--red:#E53935;--blue:#0088CC;--orange:#F57C00;
  --text:#1A1A2E;--muted:#6B7280;--border:rgba(0,0,0,0.1);
}
body{font-family:'Cairo',sans-serif;background:#F0F4F8;color:#1A1A2E;min-height:100vh;}
input,select,textarea{width:100%;background:#F8FAFC;border:1.5px solid #D1D5DB;border-radius:11px;padding:12px 15px;color:#1A1A2E;font-family:'Cairo',sans-serif;font-size:.93rem;margin-bottom:12px;outline:none;transition:all .25s;direction:rtl;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:#FFFDE7;}
select option{background:#111;}
textarea{min-height:60px;resize:none;}
.lbl{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;}
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),#FFA000);color:#000;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,215,0,.3);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#F44336);color:#fff;}
.btn-orange:hover{transform:translateY(-2px);}
.btn-green{background:linear-gradient(135deg,var(--green),#00A846);color:#000;}
.btn-green:hover{transform:translateY(-1px);}
.btn-ghost-red{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.25);}
.btn-ghost-org{background:rgba(255,152,0,.1);color:var(--orange);border:1px solid rgba(255,152,0,.25);}
.btn:disabled{background:#222!important;color:#444!important;cursor:not-allowed;transform:none!important;}

/* REGISTER */
#regWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(255,215,0,0.07) 0%,transparent 55%);}
.reg-card{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:22px;padding:36px 28px;width:100%;max-width:420px;box-shadow:0 8px 24px rgba(0,0,0,.1);}
.reg-logo{text-align:center;margin-bottom:20px;}
.reg-logo .ico{font-size:2.8rem;}
.reg-logo h2{font-size:1.4rem;font-weight:900;color:var(--gold);margin-top:8px;}
.reg-logo p{color:var(--muted);font-size:.82rem;margin-top:4px;}
.logo-circle{width:80px;height:80px;border-radius:50%;background:#E8EFF5;border:3px dashed rgba(255,215,0,.25);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 7px;cursor:pointer;overflow:hidden;transition:border-color .2s;}
.logo-circle:hover{border-color:var(--gold);}
.logo-circle img{width:100%;height:100%;object-fit:cover;}
.loc-btn{width:100%;background:rgba(0,201,255,.08);border:1.5px solid rgba(0,201,255,.2);color:var(--blue);border-radius:11px;padding:12px;font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.loc-btn:hover{background:rgba(0,201,255,.14);}
.loc-ok{font-size:.76rem;text-align:center;margin-bottom:12px;min-height:18px;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.divider span{color:var(--muted);font-size:.76rem;}

/* LOGIN */
#loginWrap{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(255,215,0,0.07) 0%,transparent 55%);}
.login-card{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:22px;padding:40px 28px;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.1);}
.shop-av-sm{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);margin:0 auto 14px;display:block;}
.shop-av-ph{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#2a2a2a,#444);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 14px;border:3px solid rgba(255,215,0,.25);}

/* APP */
#app{display:none;}
.topbar{background:var(--card);border-bottom:1px solid #E5E7EB;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.tb-left{display:flex;align-items:center;gap:10px;}
.shop-mini-av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
.shop-mini-ph{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#333,#555);display:flex;align-items:center;justify-content:center;font-size:1rem;}
.tb-name{font-size:.92rem;font-weight:900;color:var(--gold);}
.tb-sub{font-size:.66rem;color:var(--muted);}
.tb-right{display:flex;align-items:center;gap:7px;}

/* install btn */
#installBtn{display:none;align-items:center;gap:5px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green);border-radius:8px;padding:5px 10px;font-family:'Cairo',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer;}
#installBtn:hover{background:rgba(0,230,118,.2);}

.bell{position:relative;width:36px;height:36px;border-radius:9px;background:rgba(255,215,0,.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;}
.bell-dot{position:absolute;top:4px;left:4px;width:15px;height:15px;background:var(--red);border-radius:50%;font-size:.56rem;font-weight:900;color:#fff;display:none;align-items:center;justify-content:center;animation:pop .9s ease infinite;}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.exit-btn{background:none;border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:8px;padding:5px 11px;font-family:'Cairo',sans-serif;font-size:.74rem;cursor:pointer;}
.exit-btn:hover{border-color:var(--red);color:var(--red);}

.tabs{display:flex;background:var(--card);border-bottom:1px solid #E5E7EB;}
.tab{flex:1;padding:12px 4px;text-align:center;font-weight:700;font-size:.78rem;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.tab-pill{background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:.64rem;font-weight:900;animation:pop .9s ease infinite;}

.wrap{max-width:660px;margin:0 auto;padding:14px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:15px;}
.sbox{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:12px;padding:12px 6px;text-align:center;}
.sval{font-size:1.4rem;font-weight:900;}
.slbl{font-size:.62rem;color:var(--muted);margin-top:2px;}

.order-form{background:#FFFFFF;border:1px solid #FCD34D;border-radius:18px;padding:18px;margin-bottom:15px;}
.panel-title{font-size:.78rem;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
.fg .s2{grid-column:1/-1;}

.sec-hd{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;}
.ocard{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:15px;padding:16px;margin-bottom:11px;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ocard.c-sent{border-color:rgba(255,152,0,.4);}
.ocard.c-taken{border-color:rgba(0,230,118,.5);animation:fadeUp .35s ease,glowG 2s ease infinite;}
@keyframes glowG{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(0,230,118,.2)}}
.ocard.c-conf{border-color:rgba(0,201,255,.4);}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:5px;}
.cid{font-size:.82rem;font-weight:800;color:var(--blue);}
.ctime{font-size:.68rem;color:var(--muted);}
.chip{padding:3px 11px;border-radius:20px;font-size:.68rem;font-weight:800;display:inline-flex;align-items:center;gap:4px;}
.ch-sent{background:rgba(255,152,0,.12);color:var(--orange);}
.ch-taken{background:rgba(0,230,118,.12);color:var(--green);animation:pop .9s ease infinite;}
.ch-conf{background:rgba(0,201,255,.12);color:var(--blue);}
.ch-done{background:rgba(255,215,0,.12);color:var(--gold);}
.ch-cancel{background:rgba(255,68,68,.1);color:var(--red);}
.cbody{display:grid;grid-template-columns:1fr 1fr;gap:7px 12px;margin-bottom:10px;}
.cf-lbl{font-size:.66rem;color:var(--muted);margin-bottom:1px;}
.cf-val{font-size:.86rem;font-weight:700;}
.cf-val.price{color:var(--gold);font-size:1.05rem;font-weight:900;}
.cf-s2{grid-column:1/-1;}
.drv-row{display:flex;align-items:center;gap:11px;background:#E8EFF5;border-radius:11px;padding:11px 13px;margin-bottom:10px;}
.drv-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);flex-shrink:0;}
.drv-av-ph{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#F44336);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.drv-name{font-weight:900;font-size:.9rem;}
.drv-phone{color:var(--muted);font-size:.77rem;margin-top:1px;}
.drv-tag{display:inline-block;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25);border-radius:20px;padding:2px 9px;font-size:.64rem;font-weight:800;margin-top:4px;}
.cactions{display:flex;gap:7px;flex-wrap:wrap;}
.cactions .btn{flex:1;min-width:90px;padding:10px 8px;font-size:.8rem;}
.dcard{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:15px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:13px;}
.dcard-av{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);flex-shrink:0;}
.dcard-ph{width:52px;height:52px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.dcard-info{flex:1;}
.dcard-name{font-weight:900;font-size:.93rem;}
.dcard-phone{color:var(--muted);font-size:.77rem;margin-top:1px;}
.on-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0;animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;}
.backdrop.on{display:block;}
.ndrawer{position:fixed;top:0;right:0;width:min(330px,90vw);height:100vh;background:var(--card);border-right:none;border-left:1px solid #E5E7EB;z-index:901;padding:18px 15px;overflow-y:auto;box-shadow:-4px 0 40px rgba(0,0,0,.15);transform:translateX(110%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.ndrawer.on{transform:translateX(0);}
.nd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.nd-title{font-size:.95rem;font-weight:900;color:var(--orange);}
.nd-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;}
.ni{background:#E8EFF5;border-radius:9px;padding:9px 11px;margin-bottom:7px;border-right:3px solid var(--orange);font-size:.78rem;}
.ni-t{color:var(--muted);font-size:.65rem;margin-top:2px;}
.nd-clear{width:100%;background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.22);border-radius:9px;padding:9px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;margin-top:6px;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-90px);padding:11px 22px;border-radius:50px;font-weight:800;font-size:.84rem;z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 28px rgba(0,0,0,.6);min-width:220px;text-align:center;pointer-events:none;}
.toast.on{transform:translateX(-50%) translateY(0);}
/* loading overlay */
#loadingOverlay{position:fixed;inset:0;background:#0A0A0A;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px;}
.spinner{width:44px;height:44px;border:3px solid rgba(255,215,0,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:42px 16px;color:var(--muted);}
.empty-ico{font-size:46px;opacity:.2;margin-bottom:10px;}
@media(max-width:460px){.stats{grid-template-columns:repeat(2,1fr);}.fg{grid-template-columns:1fr;}.fg .s2{grid-column:1;}.cbody{grid-template-columns:1fr;}.cf-s2{grid-column:1;}}
</style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><p style="color:var(--muted);font-size:.85rem">جاري التحميل...</p></div>

<!-- REGISTER -->
<div id="regWrap" style="display:none">
  <div class="reg-card">
    <div class="reg-logo"><div class="ico">🏪</div><h2>أمواج — تسجيل المحل</h2><p>سجّل محلك مرة واحدة</p></div>
    <div style="text-align:center;margin-bottom:18px">
      <div class="logo-circle" id="logoCircle" onclick="document.getElementById('logoFile').click()">
        <span id="logoEmoji">🏪</span><img id="logoImg" style="display:none"/>
      </div>
      <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="pickLogo(this)">
      <p style="color:var(--muted);font-size:.72rem;margin-top:4px">صورة المحل</p>
    </div>
    <span class="lbl">اسم المحل</span>
    <input type="text" id="rName" placeholder="أمواج للإلكترونيات"/>
    <span class="lbl">رقم الهاتف</span>
    <input type="tel" id="rPhone" placeholder="07xxxxxxxxx" maxlength="11"/>
    <span class="lbl">المنطقة / العنوان</span>
    <input type="text" id="rArea" placeholder="الكرامة — شارع الإمام علي"/>
    <button class="loc-btn" onclick="getLocation()">📍 تحديد موقع المحل</button>
    <div class="loc-ok" id="locSt">لم يتم تحديد الموقع</div>
    <span class="lbl">كلمة مرور الدخول</span>
    <input type="password" id="rPass" placeholder="اختر كلمة مرور"/>
    <button class="btn btn-gold" onclick="doRegister()">✅ تسجيل والدخول</button>
    <div class="divider"><span>عندك حساب؟</span></div>
    <button class="btn" style="width:100%;background:rgba(255,215,0,.07);color:var(--gold);border:1px solid var(--border);" onclick="showLogin()">🔑 دخول</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div id="loginAv" class="shop-av-ph">🏪</div>
    <h2 id="loginName" style="font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:4px">--</h2>
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:22px">أدخل كلمة مرور المحل</p>
    <input type="password" id="lPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn btn-gold" onclick="doLogin()">دخول</button>
    <div class="divider"><span>محل مختلف؟</span></div>
    <button class="btn" style="width:100%;background:#F8FAFC;color:var(--muted);border:1px solid rgba(255,255,255,.08);" onclick="showRegister()">➕ تسجيل محل جديد</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div id="topAv" class="shop-mini-ph">🏪</div>
      <div><div class="tb-name" id="topName">--</div><div class="tb-sub" id="topSub">--</div></div>
    </div>
    <div class="tb-right">
      <button id="installBtn" onclick="installPWA()">📲 تثبيت</button>
      <div class="bell" onclick="toggleNotif()">🔔<div class="bell-dot" id="bellDot">0</div></div>
      <button class="exit-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" id="t1" onclick="goTab(1)">📋 الطلبات <span class="tab-pill" id="tpill" style="display:none">0</span></div>
    <div class="tab"    id="t2" onclick="goTab(2)">🛵 المندوبين</div>
    <div class="tab"    id="t3" onclick="goTab(3)">✅ المنجزة</div>
  </div>
  <div class="wrap">
    <div class="stats">
      <div class="sbox"><div class="sval" id="s1" style="color:var(--orange)">0</div><div class="slbl">ينتظر</div></div>
      <div class="sbox"><div class="sval" id="s2" style="color:var(--green)">0</div><div class="slbl">وافق مندوب</div></div>
      <div class="sbox"><div class="sval" id="s3" style="color:var(--blue)">0</div><div class="slbl">مؤكدة</div></div>
      <div class="sbox"><div class="sval" id="s4" style="color:var(--gold)">0</div><div class="slbl">مسلّمة</div></div>
    </div>
    <div id="tc1"></div>
    <div id="tc2" style="display:none"></div>
    <div id="tc3" style="display:none"></div>
  </div>
</div>

<div class="backdrop" id="bdrop" onclick="toggleNotif()"></div>
<div class="ndrawer" id="ndrawer">
  <div class="nd-head"><div class="nd-title">🔔 الإشعارات</div><button class="nd-close" onclick="toggleNotif()">✕</button></div>
  <div id="nlist"></div>
  <button class="nd-clear" onclick="clearNotifs()">مسح الكل</button>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="config.js"></script>
<script>
/* ══ INIT FIREBASE ══ */
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

/* ══ OneSignal ══ */
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({ appId: ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin: true });
  OneSignal.Notifications.requestPermission();
});

/* إرسال إشعار لكل المندوبين عبر OneSignal REST API */
async function notifyAllDrivers(title, body){
  try{
    await fetch('https://onesignal.com/api/v1/notifications',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Basic '+ONESIGNAL_API_KEY},
      body:JSON.stringify({
        app_id: ONESIGNAL_APP_ID,
        included_segments: ['Total Subscriptions'],
        headings: {ar: title, en: title},
        contents: {ar: body, en: body},
        url: 'https://amwaj-delivery.vercel.app/driver.html',
        android_accent_color: 'FF9800',
        small_icon: 'ic_stat_onesignal_default'
      })
    });
  }catch(e){console.warn('OneSignal notify error',e);}
}

/* ══ STATE ══ */
let shop=null, shopLogo='', regLat=null, regLng=null;
let notifs=[], curtab=1, aCtx=null;
let ordersListener=null, driversListener=null;
let allOrders={}, allDrivers={};

/* ══ AUDIO ══ */
function beep(t){
  try{
    if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();
    const s=t==='alert'?[900,700,1000]:[520,660,800];
    s.forEach((f,i)=>{
      const o=aCtx.createOscillator(),g=aCtx.createGain();
      o.connect(g);g.connect(aCtx.destination);o.frequency.value=f;o.type='sine';
      const x=aCtx.currentTime+i*.14;
      g.gain.setValueAtTime(.2,x);g.gain.exponentialRampToValueAtTime(.001,x+.25);
      o.start(x);o.stop(x+.25);
    });
  }catch(e){}
}

/* ══ PWA ══ */
let installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;document.getElementById('installBtn').style.display='flex';});
async function installPWA(){if(!installPrompt)return;installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')document.getElementById('installBtn').style.display='none';installPrompt=null;}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

/* ══ PUSH ══ */
async function initPush(){
  // أبو المحل يستقبل إشعارات عبر OneSignal أيضاً
  try{
    if(shop){
      OneSignalDeferred.push(async function(OneSignal){
        await OneSignal.login('shop_'+shop.id);
      });
    }
  }catch(e){}
}

/* ══ LOGO / LOCATION ══ */
function pickLogo(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{shopLogo=e.target.result;document.getElementById('logoImg').src=shopLogo;document.getElementById('logoImg').style.display='block';document.getElementById('logoEmoji').style.display='none';};r.readAsDataURL(f);}
function getLocation(){
  const st=document.getElementById('locSt');st.textContent='⏳ جاري التحديد...';st.style.color='var(--muted)';
  navigator.geolocation?.getCurrentPosition(p=>{regLat=p.coords.latitude;regLng=p.coords.longitude;st.textContent=`✅ تم (${regLat.toFixed(4)}, ${regLng.toFixed(4)})`;st.style.color='var(--green)';},()=>{st.textContent='⚠️ تعذّر التحديد';st.style.color='var(--red)';},{enableHighAccuracy:true,timeout:10000});
}

/* ══ REGISTER ══ */
async function doRegister(){
  const name=v('rName'),phone=v('rPhone'),area=v('rArea'),pass=v('rPass');
  if(!name||!phone||!area||!pass){toast('⚠️ أكمل جميع الحقول','#FF9800','#000');return;}
  if(phone.length<10){toast('⚠️ رقم هاتف ناقص','#FF9800','#000');return;}
  const id='shop_'+Date.now();
  const s={id,name,phone,area,logo:shopLogo,pass,lat:regLat,lng:regLng,ts:new Date().toISOString()};
  await db.ref(`shops/${id}`).set(s);
  localStorage.setItem('amwaj_shop_id',id);
  localStorage.setItem(`amwaj_shop_pass_${id}`,pass);
  enterApp(s);
}

/* ══ LOGIN ══ */
function showLogin(){
  const id=localStorage.getItem('amwaj_last_shop');
  if(id){
    db.ref(`shops/${id}`).once('value').then(snap=>{
      const s=snap.val();if(!s)return;
      document.getElementById('loginName').textContent=s.name;
      document.getElementById('loginAv').innerHTML=s.logo?`<img src="${s.logo}" class="shop-av-sm"/>`:'🏪';
    });
  }
  document.getElementById('regWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
}
function showRegister(){document.getElementById('loginWrap').style.display='none';document.getElementById('regWrap').style.display='flex';}

async function doLogin(){
  const pass=v('lPass');
  const id=localStorage.getItem('amwaj_last_shop');
  if(!id){toast('⚠️ سجّل محلك أولاً','#FF9800','#000');return;}
  const snap=await db.ref(`shops/${id}`).once('value');
  const s=snap.val();
  if(!s||s.pass!==pass){toast('❌ كلمة مرور خاطئة','#FF4444','#fff');return;}
  enterApp(s);
}

function enterApp(s){
  shop=s;
  localStorage.setItem('amwaj_last_shop',s.id);
  document.getElementById('regWrap').style.display='none';
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topName').textContent=s.name;
  document.getElementById('topSub').textContent=s.area+' — '+s.phone;
  if(s.logo)document.getElementById('topAv').innerHTML=`<img src="${s.logo}" class="shop-mini-av"/>`;
  notifs=JSON.parse(localStorage.getItem('notifs_'+s.id)||'[]');
  updateBell();
  startListeners();
  initPush();
}

function doLogout(){
  if(ordersListener)db.ref('orders').off('value',ordersListener);
  if(driversListener)db.ref('drivers').off('value',driversListener);
  shop=null;allOrders={};allDrivers={};
  document.getElementById('app').style.display='none';
  showLogin();
}

/* ══ TABS ══ */
function goTab(n){curtab=n;[1,2,3].forEach(i=>{document.getElementById('t'+i).className='tab'+(i===n?' on':'');document.getElementById('tc'+i).style.display=i===n?'block':'none';});renderAll();}

/* ══ FIREBASE LISTENERS ══ */
let prevTakenIds=[];
function startListeners(){
  ordersListener=db.ref('orders').on('value',snap=>{
    allOrders=snap.val()||{};
    checkAlerts();
    renderAll();
  });
  driversListener=db.ref('drivers').on('value',snap=>{allDrivers=snap.val()||{};renderAll();});
}

function checkAlerts(){
  const myOrders=Object.values(allOrders).filter(o=>o.shopId===shop.id);
  const confirmed=myOrders.filter(o=>o.status==='confirmed'&&o.drvId);
  const newConf=confirmed.filter(o=>!prevTakenIds.includes(o.id));
  newConf.forEach(o=>{
    const n=o.drvName||'مندوب';
    const locTxt=o.drvLat?` — 📍 موقعه متاح`:' — موقعه غير متاح';
    addNotif(`🛵 ${n} في الطريق إليك — طلب ${o.id}${locTxt}`);
    beep('alert');
    toast(`🛵 ${n} قبل طلبك وفي الطريق!`,'#FF9800','#000');
    if(Notification.permission==='granted')new Notification(`🛵 ${n} في الطريق!`,{body:`طلب ${o.id} — ${o.area}`,icon:'/icon-192.png',vibrate:[300,100,300]});
  });
  prevTakenIds=confirmed.map(o=>o.id);
}

/* ══ RENDER ══ */
function renderAll(){
  if(!shop)return;
  const myOrders=Object.values(allOrders).filter(o=>o.shopId===shop.id);
  const drivers=Object.values(allDrivers);
  const today=new Date().toDateString();
  document.getElementById('s1').textContent=myOrders.filter(o=>o.status==='sent').length;
  document.getElementById('s2').textContent=myOrders.filter(o=>o.status==='taken').length;
  document.getElementById('s3').textContent=myOrders.filter(o=>o.status==='confirmed').length;
  document.getElementById('s4').textContent=myOrders.filter(o=>o.status==='delivered'&&new Date(o.ts).toDateString()===today).length;
  const need=myOrders.filter(o=>o.status==='taken').length;
  const pill=document.getElementById('tpill');pill.style.display=need?'inline-block':'none';pill.textContent=need;
  if(curtab===1)renderTab1(myOrders,drivers);
  if(curtab===2)renderTab2(drivers,myOrders);
  if(curtab===3)renderTab3(myOrders,drivers);
}

function renderTab1(myOrders,drivers){
  const el=document.getElementById('tc1');
  const active=myOrders.filter(o=>!['delivered','cancelled'].includes(o.status))
    .sort((a,b)=>({taken:0,sent:1,confirmed:2}[a.status]??9)-({taken:0,sent:1,confirmed:2}[b.status]??9));
  let h=`<div class="order-form">
    <div class="panel-title">➕ طلب توصيل جديد</div>
    <div class="fg">
      <div><span class="lbl">المنطقة</span><select id="fArea"><option value="">-- اختر --</option>
        <option>العباسية</option><option>الحر</option><option>الملتقى</option><option>العلوي</option>
        <option>الكرامة</option><option>المرحلة</option><option>الحسينية</option><option>الروضة</option>
        <option>باب الخان</option><option>الجديدة</option><option>طويريج</option><option>أخرى</option>
      </select></div>
      <div><span class="lbl">المبلغ (دينار)</span><input type="number" id="fPrice" placeholder="0" min="0"/></div>
      <div class="s2"><span class="lbl">العنوان</span><textarea id="fAddr" placeholder="الشارع، قرب..."></textarea></div>
      <div><span class="lbl">اسم الزبون</span><input type="text" id="fName" placeholder="الاسم"/></div>
      <div><span class="lbl">هاتف الزبون</span><input type="tel" id="fPhone" placeholder="07xxxxxxxxx" maxlength="11"/></div>
      <div class="s2"><span class="lbl">ملاحظة</span><input type="text" id="fNote" placeholder="اختياري..."/></div>
    </div>
    <button class="btn btn-orange" style="width:100%;padding:14px" id="sendBtn" onclick="sendOrder()">🛵 إرسال للمندوبين</button>
  </div>`;
  if(!active.length)h+=`<div class="empty"><div class="empty-ico">📭</div><p>لا يوجد طلبات نشطة</p></div>`;
  else{h+=`<div class="sec-hd">الطلبات النشطة <span style="color:#1A1A2E">${active.length}</span></div>`;active.forEach(o=>{h+=buildCard(o,drivers);});}
  el.innerHTML=h;
}

function buildCard(o,drivers){
  const drv=drivers.find(d=>d.id===o.drvId);
  const chips={sent:`<span class="chip ch-sent">📡 ينتظر مندوب</span>`,taken:`<span class="chip ch-taken">⚡ مندوب وافق!</span>`,confirmed:`<span class="chip ch-conf">🛵 في الطريق</span>`};
  let drvRow='';
  if(drv&&(o.status==='taken'||o.status==='confirmed')){
    const hasLoc=o.drvLat&&o.drvLng;
    const mapsLink=hasLoc?`https://maps.google.com/?q=${o.drvLat},${o.drvLng}`:'';
    const waMsg=encodeURIComponent(`مرحباً ${drv.name}، تم تأكيد طلب التوصيل رقم ${o.id} — المنطقة: ${o.area}`);
    const waLink=`https://wa.me/964${drv.phone.replace(/^0/,'')}?text=${waMsg}`;
    drvRow=`<div class="drv-row">
      ${drv.avatar?`<img src="${drv.avatar}" class="drv-av"/>`:`<div class="drv-av-ph">🛵</div>`}
      <div style="flex:1">
        <div class="drv-name">${drv.name}</div>
        <div class="drv-phone">📞 ${drv.phone}</div>
        <div class="drv-tag">وافق على الطلب</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        ${hasLoc?`<a href="${mapsLink}" target="_blank" style="display:flex;align-items:center;gap:4px;background:rgba(0,201,255,.1);border:1px solid rgba(0,201,255,.25);color:#00C9FF;border-radius:8px;padding:5px 9px;font-size:.72rem;font-weight:800;text-decoration:none">📍 موقعه</a>`:''}
        <a href="${waLink}" target="_blank" style="display:flex;align-items:center;gap:4px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;border-radius:8px;padding:5px 9px;font-size:.72rem;font-weight:800;text-decoration:none">💬 واتساب</a>
      </div>
    </div>`;
  }
  let acts='';
  if(o.status==='sent')acts=`<div class="cactions"><button class="btn btn-ghost-red" onclick="cancelOrd('${o.id}')">✕ إلغاء</button></div>`;
  else if(o.status==='taken'||o.status==='confirmed')acts=`<div class="cactions"><button class="btn btn-ghost-red" onclick="cancelOrd('${o.id}')">✕ إلغاء</button></div>`;
  return`<div class="ocard ${o.status==='sent'?'c-sent':o.status==='taken'?'c-taken':'c-conf'}">
    <div class="ctop"><span class="cid">${o.id}</span>${chips[o.status]||''}<span class="ctime">${ago(o.ts)}</span></div>
    <div class="cbody">
      <div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div>
      <div><div class="cf-lbl">المبلغ</div><div class="cf-val price">${fmt(o.price)} د.ع</div></div>
      <div><div class="cf-lbl">الزبون</div><div class="cf-val">👤 ${o.name}</div></div>
      <div><div class="cf-lbl">الهاتف</div><div class="cf-val">📞 ${o.phone}</div></div>
      <div class="cf-s2"><div class="cf-lbl">العنوان</div><div class="cf-val" style="font-size:.8rem">🗺 ${o.addr}</div></div>
      ${o.note?`<div class="cf-s2"><div class="cf-lbl">ملاحظة</div><div class="cf-val" style="font-size:.8rem">📝 ${o.note}</div></div>`:''}
    </div>${drvRow}${acts}</div>`;
}

function renderTab2(drivers,myOrders){
  const el=document.getElementById('tc2');
  if(!drivers.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🛵</div><p>لا يوجد مندوبين</p></div>`;return;}
  el.innerHTML=drivers.map(d=>{
    const tot=myOrders.filter(o=>o.drvId===d.id).length;
    const done=myOrders.filter(o=>o.drvId===d.id&&o.status==='delivered').length;
    const act=myOrders.filter(o=>o.drvId===d.id&&!['delivered','cancelled'].includes(o.status)).length;
    return`<div class="dcard">${d.avatar?`<img src="${d.avatar}" class="dcard-av"/>`:`<div class="dcard-ph">👤</div>`}<div class="dcard-info"><div class="dcard-name">${d.name}</div><div class="dcard-phone">📞 ${d.phone}</div><div style="display:flex;gap:10px;margin-top:5px;flex-wrap:wrap"><span style="font-size:.7rem;color:var(--muted)">نشط: <strong style="color:var(--orange)">${act}</strong></span><span style="font-size:.7rem;color:var(--muted)">منجز: <strong style="color:var(--green)">${done}</strong></span><span style="font-size:.7rem;color:var(--muted)">إجمالي: <strong>${tot}</strong></span></div></div>${act?'<div class="on-dot"></div>':''}</div>`;
  }).join('');
}

function renderTab3(myOrders,drivers){
  const el=document.getElementById('tc3');
  const done=myOrders.filter(o=>['delivered','cancelled'].includes(o.status)).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(!done.length){el.innerHTML=`<div class="empty"><div class="empty-ico">✅</div><p>لا يوجد منجزة</p></div>`;return;}
  el.innerHTML=done.map(o=>{
    const drv=drivers.find(d=>d.id===o.drvId);
    const chip=o.status==='delivered'?`<span class="chip ch-done">✅ مسلّم</span>`:`<span class="chip ch-cancel">✕ ملغي</span>`;
    return`<div class="ocard"><div class="ctop"><span class="cid">${o.id}</span>${chip}<span class="ctime">${ago(o.ts)}</span></div><div class="cbody"><div><div class="cf-lbl">المنطقة</div><div class="cf-val">📍 ${o.area}</div></div><div><div class="cf-val price">${fmt(o.price)} د.ع</div></div><div><div class="cf-val">👤 ${o.name} — ${o.phone}</div></div>${drv?`<div><div class="cf-val" style="font-size:.8rem">🛵 ${drv.name}</div></div>`:''}</div></div>`;
  }).join('');
}

/* ══ ORDER ACTIONS ══ */
async function sendOrder(){
  const area=v('fArea'),addr=v('fAddr'),price=v('fPrice'),name=v('fName'),phone=v('fPhone'),note=v('fNote');
  if(!area||!addr||!price||+price<=0||!name||!phone||phone.length<10){toast('⚠️ أكمل جميع الحقول','#FF9800','#000');return;}
  const btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent='⏳ جاري الإرسال...';
  const id='ORD-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const order={id,shopId:shop.id,shopName:shop.name,shopPhone:shop.phone,shopArea:shop.area,shopLat:shop.lat||null,shopLng:shop.lng||null,shopLogo:shop.logo||'',area,addr,price,name,phone,note,status:'sent',ts:new Date().toISOString(),drvId:null};
  await db.ref(`orders/${id}`).set(order);
  // إشعار OneSignal لكل المندوبين
  await notifyAllDrivers(
    `🛵 طلب جديد — ${shop.name}`,
    `📍 ${area} — ${fmt(price)} د.ع — اضغط لقبول الطلب`
  );
  btn.disabled=false;btn.innerHTML='🛵 إرسال للمندوبين';
  ['fArea','fAddr','fPrice','fName','fPhone','fNote'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  toast('📡 تم إرسال الطلب للمندوبين!','#FF9800','#000');
  addNotif(`📡 أُرسل الطلب ${id} — ${area}`);
}

async function approveDriver(id){await db.ref(`orders/${id}`).update({status:'confirmed'});toast('✅ تمت الموافقة!','#00E676','#000');addNotif(`✅ موافقة على المندوب — ${id}`);}
async function rejectDriver(id){await db.ref(`orders/${id}`).update({status:'sent',drvId:null});toast('🔄 رُفض المندوب — الطلب عاد','#FF9800','#000');}
async function cancelOrd(id){if(!confirm('إلغاء هذا الطلب؟'))return;await db.ref(`orders/${id}`).update({status:'cancelled'});toast('✕ تم الإلغاء','#FF4444','#fff');}

/* ══ STORAGE / UTILS ══ */
function v(id){return document.getElementById(id)?.value||'';}
function fmt(n){return Number(n).toLocaleString('ar-IQ');}
function ago(ts){const m=Math.floor((Date.now()-new Date(ts))/60000);return m<1?'الآن':m<60?`${m} دق`:m<1440?`${Math.floor(m/60)} س`:`${Math.floor(m/1440)} يوم`;}

/* ══ NOTIFS ══ */
function addNotif(msg){notifs.unshift({msg,t:new Date().toISOString()});if(notifs.length>40)notifs=notifs.slice(0,40);if(shop)localStorage.setItem('notifs_'+shop.id,JSON.stringify(notifs));updateBell();renderNotifs();}
function updateBell(){const d=document.getElementById('bellDot');d.style.display=notifs.length?'flex':'none';d.textContent=notifs.length>9?'9+':notifs.length;}
function toggleNotif(){document.getElementById('ndrawer').classList.toggle('on');document.getElementById('bdrop').classList.toggle('on');renderNotifs();}
function renderNotifs(){const el=document.getElementById('nlist');el.innerHTML=notifs.length?notifs.map(n=>`<div class="ni">${n.msg}<div class="ni-t">${ago(n.t)}</div></div>`).join(''):`<p style="color:var(--muted);text-align:center;padding:18px">لا يوجد إشعارات</p>`;}
function clearNotifs(){notifs=[];if(shop)localStorage.setItem('notifs_'+shop.id,'[]');updateBell();renderNotifs();}

let tt=null;
function toast(msg,bg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg;t.style.color=color||'#000';t.classList.add('on');if(tt)clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),3200);}

/* ══ AUTO LOGIN ══ */
async function init(){
  const id=localStorage.getItem('amwaj_last_shop');
  if(id){
    try{
      const snap=await db.ref(`shops/${id}`).once('value');
      const s=snap.val();
      if(s){enterApp(s);document.getElementById('loadingOverlay').style.display='none';return;}
    }catch(e){}
  }
  document.getElementById('loadingOverlay').style.display='none';
  const shops_snap=await db.ref('shops').once('value');
  if(shops_snap.val()){
    const shops=Object.values(shops_snap.val());
    if(shops.length){
      const last=shops[shops.length-1];
      document.getElementById('loginName').textContent=last.name;
      document.getElementById('loginAv').innerHTML=last.logo?`<img src="${last.logo}" class="shop-av-sm"/>`:'🏪';
      localStorage.setItem('amwaj_last_shop',last.id);
      showLogin();
    }else showRegister();
  }else{document.getElementById('regWrap').style.display='flex';}
}
init();
</script>
